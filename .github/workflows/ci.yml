name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: Lint
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - &checkout
        uses: actions/checkout@v6

      - &setup-go
        name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v9

  build:
    name: Build
    needs: lint
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - *checkout
      - *setup-go

      - name: Build
        run: go build -v ./...

  test:
    name: Test
    needs: lint
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - *checkout
      - *setup-go

      - name: Test
        run: go test -v ./...

  actionlint:
    name: Actionlint
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - *checkout

      - name: Actionlint
        run: docker run --rm -v "$(pwd):$(pwd)" -w "$(pwd)" rhysd/actionlint:latest -color

  pr-todo:
    name: PR TODO Check
    if: github.event_name == 'pull_request'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Install gh-pr-todo extension
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh extension install Suree33/gh-pr-todo

      - name: Run gh-pr-todo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr-todo -R "${GITHUB_REPOSITORY}" "${{ github.event.pull_request.number }}"
