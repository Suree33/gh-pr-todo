name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  run:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - run: gh ext install Suree33/gh-pr-todo
        env:
          GH_TOKEN: ${{github.token}}
      - run: gh pr-todo https://github.com/Suree33/gh-pr-todo/pull/41
        env:
          GH_TOKEN: ${{github.token}}
