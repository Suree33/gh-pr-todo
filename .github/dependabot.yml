version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
      semver-major-days: 14
    schedule:
      interval: daily
  - package-ecosystem: github-actions
    directory: /
    cooldown:
      default-days: 7
    schedule:
      interval: daily
